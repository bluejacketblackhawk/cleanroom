name: Nightly

# Establishes the nightly wiring the plan calls for (06 §5). In M0 it runs the core
# tests + eval canary. In M1 lane C this grows into: full-corpus eval, perf (RTF + RAM),
# determinism double-render, and the 100-file soak, publishing trend HTML to an
# `eval-reports` branch.
on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  core-tests:
    name: core tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # macos-latest = macOS 15 arm64. macos-15-intel is deliberately ABSENT: `cargo test
        # --workspace` NEVER FINISHES there. anvil-ai's DeepFilterNet3 tests — and anvil-cli's
        # end-to-end cmd_master_* tests, which drive the same chain — run real neural inference on
        # the slowest runner GitHub rents, and the one target where `ort` is load-dynamic with no
        # CoreML path (ADR-012). Three separate runs sat between 40 and 70+ minutes without
        # completing, while the identical tests pass in seconds on the two lanes below.
        # ci.yml drops its test step on that lane for exactly this reason and keeps the lane for
        # rustfmt/clippy/build (the x86_64 anti-cliff signal). THIS job is tests-only, so the lane
        # has nothing left to contribute — it would just hang the nightly every morning.
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude anvil-desktop

  eval-smoke:
    name: eval canary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python eval/run.py smoke
    # TODO(M1 lane C): full corpus eval + perf + determinism + 100-file soak here.
